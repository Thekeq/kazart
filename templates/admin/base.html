<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KAZart Admin</title>
  <style>
    :root { color-scheme: light; font-family: Inter, system-ui, -apple-system, Segoe UI, sans-serif; }
    body { margin: 0; background: #f5f7fb; color: #1f2937; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; padding: 18px 28px; background: #111827; color: #fff; }
    nav { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; }
    nav a, header button { color: #fff; text-decoration: none; background: none; border: 0; cursor: pointer; font: inherit; }
    main { max-width: 1120px; margin: 0 auto; padding: 28px; overflow-x: auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
    .card, table, form.panel { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; box-shadow: 0 1px 2px rgba(15, 23, 42, .05); }
    .card, form.panel { padding: 18px; }
    .card strong { display: block; font-size: 26px; margin-top: 6px; overflow-wrap: anywhere; }
    table { width: 100%; min-width: 760px; border-collapse: collapse; overflow: hidden; }
    th, td { padding: 11px 12px; border-bottom: 1px solid #e5e7eb; text-align: left; font-size: 14px; vertical-align: top; overflow-wrap: anywhere; }
    th { background: #f9fafb; color: #4b5563; }
    input, textarea { width: 100%; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 6px; padding: 10px 12px; font: inherit; }
    textarea { min-height: 130px; resize: vertical; }
    label { display: block; margin: 14px 0 6px; font-weight: 600; }
    .btn { display: inline-flex; align-items: center; justify-content: center; border: 0; border-radius: 6px; padding: 10px 14px; background: #2563eb; color: #fff; text-decoration: none; cursor: pointer; font: inherit; }
    .btn.secondary { background: #475569; }
    .messages { margin-bottom: 16px; }
    .message { padding: 10px 12px; border-radius: 6px; margin: 8px 0; background: #e0f2fe; }
    .message.error { background: #fee2e2; }
    .muted { color: #64748b; }
    h2 { margin: 26px 0 12px; font-size: 19px; }
    .card .sub { display: block; margin-top: 4px; color: #64748b; font-size: 12px; font-weight: 400; }
    .card.good { border-left: 4px solid #059669; }
    .card.good strong { color: #059669; }
    .card.bad { border-left: 4px solid #dc2626; }
    .card.bad strong { color: #dc2626; }
    .card.accent { border-left: 4px solid #2563eb; }
    .bars { display: grid; gap: 12px; padding: 18px; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; box-shadow: 0 1px 2px rgba(15, 23, 42, .05); }
    .bar-row { display: grid; grid-template-columns: 84px 1fr auto; gap: 12px; align-items: center; font-size: 14px; }
    .bar-row > span:first-child { font-weight: 600; text-transform: capitalize; }
    .bar-track { height: 10px; border-radius: 999px; background: #e5e7eb; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #2563eb, #38bdf8); }
    .bar-row em { font-style: normal; color: #64748b; font-size: 13px; white-space: nowrap; }
    .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; background: #e0e7ff; color: #3730a3; }
    .pill.on { background: #dcfce7; color: #166534; }
    .pill.off { background: #f1f5f9; color: #64748b; }
    .inline-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .inline-actions .btn { padding: 8px 12px; font-size: 14px; }
    .user-search { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .user-search input { flex: 1 1 260px; }
    .user-search .btn { flex: 0 0 auto; }
    .pager { display: flex; align-items: center; gap: 14px; margin-top: 16px; }
    @media (max-width: 700px) {
      header { align-items: flex-start; padding: 14px 16px; }
      header form { margin: 0; }
      main { padding: 18px 12px; }
      h1 { font-size: 24px; }
      table { min-width: 680px; }
    }
  </style>
</head>
<body>
<header>
  <nav>
    <a href="{{ url_for('admin.dashboard') }}">Dashboard</a>
    <a href="{{ url_for('admin.users') }}">Users</a>
    <a href="{{ url_for('admin.payments') }}">Payments</a>
    <a href="{{ url_for('admin.broadcast_form') }}">Broadcast</a>
  </nav>
  {% if session.get('admin_id') %}
  <form method="post" action="{{ url_for('admin.logout') }}">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
    <button type="submit">Logout</button>
  </form>
  {% endif %}
</header>
<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="messages">
      {% for category, message in messages %}
        <div class="message {{ category }}">{{ message }}</div>
      {% endfor %}
      </div>
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
